<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bolder;

        }

        #first {
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;

            height: 100px;

            justify-content: space-evenly;
        }

            color: rgb(250, 240, 240);

        }

            height: 100px;
            width: 400px;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }

        #menublock a {
            color: rgb(250, 240, 240);
            text-decoration: none;
        }

        #third {
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: lightgray;

        }

        #menub {
            height: 100px;
            width: 400px;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }

        #menub a {
            color: rgb(9, 9, 9);
            text-decoration: none;
        }
    </style>

</head>

    <nav id="first">
