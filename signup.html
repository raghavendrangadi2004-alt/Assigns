<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <fieldset>
            <legend>signup page</legend>
            <label for="firstnameu">First name:</label>
            <input type="text" id="firstnameu">
            <br><br>
            <label for="lastnameu">Last name:</label>
            <input type="text" id="lastnameu">
            <br><br>
            <label for="ph">Phone No:</label>
            <input type="tel" id="ph">
            <br><br>
            <label for="usernameu">User Name:</label>
            <input type="text" id="usernameu">
            <br><br>
            <label for="pwd">Password:</label>
            <input type="password" id="pwd">
            <br><br>
            <label for="em">Email id</label>
            <input type="email" id="em">
            <br><br>
            <label for="ot">OTP:</label>
            <input type="text" id="ot">
            <br><br>
            <button>Signup</button>
            <button>Cancel</button>
            <br><br>
            <a href="">Already have an account?</a>


        </fieldset>
    </form>
</body>

</html
